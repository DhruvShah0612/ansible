<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      perspective: 500px;
    }
    h1 {
      color: white;
      font-size: 4rem;
      transform: rotateX(20deg) rotateY(30deg);
      text-shadow: 2px 2px 5px #0ff;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>
